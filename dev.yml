- name: Airflow Environment
  hosts: manager
  become: true
  gather_facts: true
  become_user: "{{ ansible_user }}"
  vars:
    pod_name: 'manager'
  tasks:
  
    - name: Login to quay.io and create ${XDG_RUNTIME_DIR}/containers/auth.json
      containers.podman.podman_login:
        username: "{{registry_user}}"
        password: "{{registry_pass}}"
        registry: dwh-ap-southeast-3.cr.bytepluses.com
  #   - name: --Initialize-- Airflow Manager
  #     ansible.builtin.include_tasks: "stack/manager/airflow.yml"

  #   - name: --Initialize-- Airflow Engine
  #     ansible.builtin.include_tasks: "stack/engine/airflow.yml"
      
    - name: --Initialize-- Dockhand
      ansible.builtin.include_tasks: "stack/security/dockhand.yml"

