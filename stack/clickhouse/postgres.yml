- name: "[DIRECTORY] Create"
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
  with_items:
    - { path: "{{local_path}}/ssl/postgres" }
    - { path: "{{local_path}}/pg_clickhouse" }
    - { path: "{{local_path}}/pg_clickhouse/config" }
    - { path: "{{local_path}}/pg_clickhouse/files" }
    - { path: "{{local_path}}/pg_clickhouse/data" }
    - { path: "{{log_path}}/pg_clickhouse" }
    - { path: "{{local_path}}/pg_citus" }
    - { path: "{{local_path}}/pg_citus/config" }
    - { path: "{{local_path}}/pg_citus/files" }
    - { path: "{{local_path}}/pg_citus/data" }
    - { path: "{{log_path}}/pg_citus" }

